version: '3.8'

services:
  db:
    image: postgres:15
    container_name: blue-lock
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admmin
      POSTGRES_DB: blue-lock-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
