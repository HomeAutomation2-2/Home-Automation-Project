services:
  postgres:
    image: postgres:15-alpine
    container_name: home_automation_v2_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: home_automation_v2
    ports:
      - "5434:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data

volumes:
  .pgdata:
